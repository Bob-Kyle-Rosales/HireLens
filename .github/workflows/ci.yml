name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore HireLens.sln

      - name: Build
        run: dotnet build HireLens.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test tests/HireLens.Web.IntegrationTests/HireLens.Web.IntegrationTests.csproj --configuration Release --no-build --logger "trx;LogFileName=test-results.trx"

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "**/test-results.trx"
