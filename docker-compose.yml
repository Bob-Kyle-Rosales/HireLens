services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: hirelens-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:-ChangeMe123!}"
    ports:
      - "14333:1433"
    volumes:
      - hirelens_sql_data:/var/opt/mssql
    restart: unless-stopped

  web:
    container_name: hirelens-web
    build:
      context: .
      dockerfile: src/HireLens.Web/Dockerfile
    depends_on:
      - sqlserver
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      Database__Provider: SqlServer
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=HireLensBackendDb;User Id=sa;Password=${MSSQL_SA_PASSWORD:-ChangeMe123!};TrustServerCertificate=True;Encrypt=False;MultipleActiveResultSets=true"
      SeedAdmin__Email: "${SEED_ADMIN_EMAIL:-}"
      SeedAdmin__Password: "${SEED_ADMIN_PASSWORD:-}"
    ports:
      - "8080:8080"
    restart: on-failure

volumes:
  hirelens_sql_data:
